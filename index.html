<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link id="theme-style"
        rel="stylesheet"
        href="CSS/style.css"
        data-light="CSS/style.css"
        data-dark="CSS/theme-2.css">
</head>
<body>
    <video autoplay muted loop id="bg-video">
        <source src="videos/WhatsApp Video 2026-04-28 at 10.14.04 PM.mp4" type="video/mp4">
    </video>

    <div class="content">
        <h2>Welcome</h2>
    </div>

    <button id="btn1" class="theme-toggle">Change Mode</button>

    <div class="login-box">
        <form id="loginForm" action="HTML/home.html" novalidate>
            
            <div class="input-box">
                <label>Email :</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-box">
                <label>Password :</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-message"></div>
            <button type="submit" class="btn">Login</button>
        </form>

        <div class="footer">
            <p>Don't have an account ? <a href="sign_up.html" class="link">Sign Up</a></p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
